// Scroll reveal — IntersectionObserver only, zero mouse tracking
function useReveal() {
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add("in");
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.08, rootMargin: "0px 0px -4% 0px" }
    );
    document.querySelectorAll(".reveal, .reveal-stagger, .reveal-left, .reveal-right, .reveal-scale")
      .forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useNavScroll() {
  useEffect(() => {
    const nav = document.getElementById("nav");
    const onScroll = () => nav.classList.toggle("scrolled", window.scrollY > 40);
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
}

function useCurtain() {
  useEffect(() => {
    const c = document.getElementById("curtain");
    const t = setTimeout(() => {
      c.classList.add("done");
      setTimeout(() => { c.style.display = "none"; }, 600);
    }, 2900);
    return () => clearTimeout(t);
  }, []);
}

function CombSVG() {
  const fine = Array.from({ length: 16 }, (_, i) => i);
  const coarse = Array.from({ length: 8 }, (_, i) => i);
  return (
    <svg viewBox="0 0 46 196" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cb-gd" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#f0d898"/>
          <stop offset="50%" stopColor="#c8a464"/>
          <stop offset="100%" stopColor="#7a5f2e"/>
        </linearGradient>
        <linearGradient id="cb-sp" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#e8c878"/>
          <stop offset="45%" stopColor="#c8a464"/>
          <stop offset="100%" stopColor="#5a4020"/>
        </linearGradient>
        <filter id="cb-sh" x="-20%" y="-5%" width="150%" height="115%">
          <feDropShadow dx="2" dy="4" stdDeviation="2.5" floodColor="#000" floodOpacity="0.55"/>
        </filter>
      </defs>
      <g filter="url(#cb-sh)">
        {/* spine */}
        <rect x="28" y="0" width="18" height="196" rx="4"
          fill="url(#cb-sp)" stroke="#2a1808" strokeWidth="0.7"/>
        <rect x="29" y="4" width="5" height="188" rx="2.5"
          fill="rgba(255,245,195,0.28)"/>
        <line x1="45" y1="4" x2="45" y2="192" stroke="rgba(0,0,0,0.28)" strokeWidth="1.5"/>

        {/* fine teeth */}
        {fine.map(i => {
          const y = 5 + i * 5.6;
          return (
            <g key={"f" + i}>
              <rect x="2" y={y} width="26" height="3.2" rx="1.6"
                fill="url(#cb-gd)" stroke="#2a1808" strokeWidth="0.35"/>
              <line x1="4" y1={y + 0.9} x2="26" y2={y + 0.9}
                stroke="rgba(255,245,195,0.48)" strokeWidth="0.7"/>
            </g>
          );
        })}

        {/* divider band */}
        <rect x="1" y="96" width="27" height="6" rx="1.5"
          fill="rgba(200,164,100,0.45)" stroke="#2a1808" strokeWidth="0.4"/>

        {/* coarse teeth */}
        {coarse.map(i => {
          const y = 108 + i * 11.2;
          return (
            <g key={"c" + i}>
              <rect x="0" y={y} width="28" height="5.5" rx="2.75"

                stroke="rgba(255,245,195,0.48)" strokeWidth="0.9"/>
            </g>
          );
        })}
      </g>
    </svg>
  );
}

function Hero() {
  const heroRef = useRef(null);

  // Scroll parallax only — no mousemove / mouse tracking
  useEffect(() => {
    const bg = heroRef.current?.querySelector(".hero__bg");
    if (!bg) return;
    const onScroll = () => {
      const y = window.scrollY;
      if (y < window.innerHeight * 1.2) {
        bg.style.transform = `translate3d(0,${y * 0.38}px,0)`;
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const renderWords = (txt, delayBase = 0) =>
    txt.split(" ").map((w, i) => (
      <span className="word" key={i}>
        <span style={{ animationDelay: `${delayBase + i * 0.1}s` }}>{w}</span>
      </span>
    ));

  return (
    <section className="hero" id="top" ref={heroRef}>
      <div className="hero__bg">
        <video className="hero__video" autoPlay muted loop playsInline poster={IMG.hero}>
          <source src="https://videos.pexels.com/video-files/3212185/3212185-hd_1920_1080_30fps.mp4" type="video/mp4" />
          <img src={IMG.hero} alt="WMH Barber interior" />
        </video>
      </div>
      <span className="hero__watermark" aria-hidden="true">BARBER</span>
      <div className="hero-scissors" aria-hidden="true">
        <ScissorsDeco />
      </div>
      <div className="hero-razor" aria-hidden="true">
        <RazorSVG3D />
      </div>
      <div className="hero-comb" aria-hidden="true">
        <CombSVG />
      </div>
      <div className="hero__content">
        <span className="hero__eyebrow">WMH Barber Casablanca Est. 2019</span>
        <h1 className="hero__display">
          {renderWords("Sharp", 0.2)}{" "}
          {renderWords("Cuts.", 0.32)}
          <br />
          <span className="word"><span style={{ animationDelay: "0.55s" }}><em>Slow</em></span></span>{" "}
          {renderWords("Rituals.", 0.7)}
        </h1>
        <div className="hero__meta">
          <div className="hero__tag">
            <span>Premium Barber and Hammam</span>
            <b>3 Rue Bab Al Irfane</b>
          </div>
          <div className="hero__tag">
            <span>Open Today</span>
            <b>10:00 - 20:00</b>

// ===================== BOOKING =====================
function Booking() {
  const [svc, setSvc] = useState(services[0]);
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [barber, setBarber] = useState("Any available");
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [bookedSlots, setBookedSlots] = useState([]);

  const slots = ["10:00","11:00","12:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

  useEffect(() => {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    setDate(d.toISOString().slice(0, 10));
  }, []);

  useEffect(() => {
    if (!date) return;
    fetch(`/api/booked-slots?date=${date}`)
      .then(r => r.json())
      .then(d => setBookedSlots(d.bookedSlots || []))
      .catch(() => setBookedSlots([]));
  }, [date]);

  const disabledSlots = useMemo(() => new Set(bookedSlots), [bookedSlots]);
  const canSubmit = svc && date && time && name.trim() && phone.trim() && !loading;

  const onSubmit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setLoading(true);
    try {
      const res = await fetch("/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, phone, service: svc.name, price: svc.price, duration: svc.time, date, time, barber }),
      });
      if (res.ok) setSubmitted(true);
    } catch (err) {
      console.error("Booking error:", err);
    } finally {
      setLoading(false);
    }
  };

  const resetForm = () => {
    setSubmitted(false); setName(""); setPhone(""); setTime(""); setSvc(services[0]);
  };

  return (
    <section className="booking" id="book">
      <div className="container booking__grid">
        <div className="booking__head reveal reveal-left">
          <span className="eyebrow">Reservation</span>
          <h2 className="section-title" style={{ marginTop: 22 }}>Book your <em>chair</em>.</h2>
          <p>Choose your ritual, pick a time, leave a name. We confirm by SMS within the hour. Cancellations free up to 4 hours before.</p>
          <div className="booking__chips">
            <span className="booking__chip">SMS Confirmation</span>
            <span className="booking__chip">No deposit</span>
            <span className="booking__chip">Walk-ins welcome</span>
          </div>
        </div>

        <form className="form reveal" onSubmit={onSubmit}>
          {submitted ? (
            <div className="form__success">
              <div className="form__success-check">&#10003;</div>
              <h3>Chair Reserved</h3>
              <p>
                Thank you, {name.split(" ")[0]}. We'll confirm at {phone}. See you{" "}
                {new Date(date).toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })} at {time}.
              </p>
              <button type="button" className="btn" onClick={resetForm} style={{ marginTop: 18 }}>
                Book another <span className="arrow">-&gt;</span>
              </button>
            </div>
          ) : (
            <>
              <div className="form__step-header">
                <span className="form__step-label">Step 01 - Service</span>
                <span className="form__step-num">{services.findIndex(s => s.num === svc.num) + 1} / {services.length}</span>
              </div>
              <div className="svc-pick">
                {services.map((s) => (
                  <button type="button" key={s.num} className={`svc-pick__btn ${svc.num === s.num ? "active" : ""}`} onClick={() => setSvc(s)}>
                    <span className="svc-pick__name">{s.name}</span>
                    <span className="svc-pick__meta">{s.time} — ${s.price} CAD</span>
                  </button>
                ))}
              </div>

              <div className="form__step-header">
                <span className="form__step-label">Step 02 - Date and Time</span>
                <span className="form__step-num">{time ? "selected" : "—"}</span>
              </div>
              <div className="form__row">
                <div className="form__group">
                  <label className="form__label">Date</label>
                  <input type="date" className="form__input" value={date}
                    onChange={(e) => { setDate(e.target.value); setTime(""); }}
                    min={new Date().toISOString().slice(0, 10)} />
                </div>
                <div className="form__group">
                  <label className="form__label">Barber</label>
                  <select className="form__select" value={barber} onChange={(e) => setBarber(e.target.value)}>
                    <option>Any available</option>
                    {barbers.map((b) => <option key={b.name}>{b.name}</option>)}
                  </select>
                </div>
              </div>
              <div className="form__group">
                <label className="form__label">Available Slots</label>
                <div className="time-grid">
                  {slots.map((t) => (
                    <button type="button" key={t} className={time === t ? "active" : ""}
                      disabled={disabledSlots.has(t)} onClick={() => setTime(t)}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              <div className="form__step-header">
                <span className="form__step-label">Step 03 - Your Details</span>
              </div>
              <div className="form__row">
                <div className="form__group">
                  <label className="form__label">Full Name</label>
                  <input type="text" className="form__input" placeholder="Adam Khalil" value={name} onChange={(e) => setName(e.target.value)} />
                </div>
                <div className="form__group">
                  <label className="form__label">Phone</label>
                  <input type="tel" className="form__input" placeholder="+212 6 12 34 56 78" value={phone} onChange={(e) => setPhone(e.target.value)} />
                </div>
              </div>

              <div className="form__summary">
                <div className="form__summary-row">
                  <span>{svc.name}</span><span>{svc.time}</span>
                </div>
                <div className="form__summary-row">
                  <span>{date ? new Date(date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}) : "—"} - {time || "—"}</span>
                  <span>{barber}</span>
                </div>
                <div className="form__summary-row total">
                  <span>Total</span><span>${svc.price} CAD</span>
                </div>
              </div>

              <button type="submit" className="btn btn--solid" disabled={!canSubmit}
                style={{ opacity: canSubmit ? 1 : 0.45, alignSelf: "flex-start" }}>
                {loading ? "Confirming..." : "Confirm Reservation"} <span className="arrow">-&gt;</span>
              </button>
            </>
          )}
        </form>
      </div>
    </section>
  );
}
